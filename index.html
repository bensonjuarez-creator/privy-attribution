<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privy Attribution Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@5.1.2/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d12; --card: #15151e; --border: #232330;
    --accent: #635bff; --green: #00c48c; --red: #ff5c5c; --amber: #f5a623;
    --text: #e6e6f0; --muted: #666;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

  .header { padding: 1.25rem 2rem; border-bottom: 1px solid var(--border);
    background: var(--card); display: flex; align-items: center; justify-content: space-between; }
  .header-left h1 { font-size: 1.2rem; font-weight: 800; color: var(--accent); letter-spacing: -0.02em; }
  .header-left p { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
  .header-tag { font-size: 0.72rem; color: var(--accent); }

  .tab-bar { background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; gap: 0; overflow-x: auto; }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); padding: 0.75rem 1.25rem; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: var(--sans); }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main { padding: 1.8rem 2rem; max-width: 1400px; margin: 0 auto; }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 1.25rem; position: relative; overflow: hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat-card:nth-child(1)::before { background: var(--accent); }
  .stat-card:nth-child(2)::before { background: var(--green); }
  .stat-card:nth-child(3)::before { background: var(--amber); }
  .stat-card:nth-child(4)::before { background: var(--red); }
  .stat-label { font-size:0.65rem; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; }
  .stat-value { font-size:1.5rem; font-weight:700; color:var(--text); line-height:1.1; }
  .stat-sub { font-size:0.72rem; color:var(--muted); margin-top:0.35rem; }

  .section-info { display:flex; align-items:center; margin:1.8rem 0 0.9rem; }
  .section-hdr { font-size:0.65rem; font-weight:700; text-transform:uppercase;
    letter-spacing:0.1em; color:var(--muted); }

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; margin-bottom:1rem; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; }
  .card-title { font-size:0.65rem; font-weight:700; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--muted); margin-bottom:1rem; }
  .chart-wrap { position:relative; height:200px; }
  .chart-wrap-sm { position:relative; height:160px; }

  table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  thead th { font-size:0.62rem; font-weight:700; color:var(--muted); text-transform:uppercase;
    letter-spacing:0.06em; text-align:left; padding:0 0.75rem 0.6rem 0;
    border-bottom:1px solid var(--border); }
  tbody td { padding:0.6rem 0.75rem 0.6rem 0; border-bottom:1px solid var(--border); color:var(--text); }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover td { background:rgba(255,255,255,0.02); }

  .badge { font-size:0.65rem; color:var(--accent); background:rgba(99,91,255,0.1);
    border:1px solid rgba(99,91,255,0.15); padding:0.18rem 0.45rem; border-radius:4px; white-space:nowrap; }

  .footer { font-size:0.7rem; color:var(--muted); margin-top:1.5rem;
    padding:0.75rem 1rem; background:var(--card); border:1px solid var(--border); border-radius:8px; }

  .ai-summary { font-size:0.85rem; line-height:1.8; color:var(--text); }
  .ai-summary h1, .ai-summary h2, .ai-summary h3 {
    font-size:0.9rem; font-weight:700; color:var(--accent);
    margin:1rem 0 0.4rem; text-transform:uppercase; letter-spacing:0.05em; }
  .ai-summary p { margin-bottom:0.6rem; }
  .ai-summary strong { color:var(--text); font-weight:700; }
  .ai-summary ul, .ai-summary ol { padding-left:1.2rem; margin-bottom:0.6rem; }
  .ai-summary li { margin-bottom:0.3rem; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>Privy Attribution</h1>
    <p id="headerSub">Loading...</p>
  </div>
  <div class="header-tag">Monthly Report</div>
</div>
<div class="tab-bar" id="tabBar">
  <span style="color:var(--muted);font-size:0.75rem;padding:0.75rem 0;align-self:center">Loading months...</span>
</div>
<div class="main" id="dashContent">
  <div style="padding:4rem;text-align:center;color:var(--muted)">Loading attribution data...</div>
</div>
<script>
const HISTORY_URL = 'https://raw.githubusercontent.com/bensonjuarez-creator/privy-attribution/main/history.json';
const COLORS = ['#635bff','#00c48c','#ff5c5c','#f5a623','#a78bfa','#6db8fa','#fa966d','#6dfad4'];
const GRID   = 'rgba(255,255,255,0.05)';
const BRAND_TERMS = ['privy','privvy','getprivy','privypro','getprivypro'];
const UNBRANDED_OV = ['privy real estate software','privy software','privy mls','privy real estate app','privy app','privy tool','privy platform','privy alternative','privy competitor','privy review','privy pricing','privy vs','privy free trial'];

let activeCharts = [];
let historyData  = [];

function isBranded(q) {
  const lower = q.toLowerCase();
  if (UNBRANDED_OV.some(o => lower.includes(o))) return false;
  return BRAND_TERMS.some(t => lower.includes(t));
}
function fmtDur(s) {
  const m = Math.floor((s||0)/60), sec = Math.floor((s||0)%60);
  return m + 'm ' + String(sec).padStart(2,'0') + 's';
}
function fmtMoney(n) { return '$' + Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0}); }
function fmtNum(n)   { return Number(n||0).toLocaleString(); }

function destroyCharts() {
  activeCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
  activeCharts = [];
}
function mkChart(id, cfg) {
  const el = document.getElementById(id);
  if (!el) return;
  try { const c = new Chart(el, cfg); activeCharts.push(c); return c; }
  catch(e) { console.warn('Chart error', id, e); }
}

function sHdr(icon, label) {
  return `<div class="section-info"><div class="section-hdr">${icon} ${label}</div></div>`;
}
function crd(title, content) {
  return `<div class="card"><div class="card-title">${title}</div>${content}</div>`;
}

function buildStats(d) {
  const sessions = (d.ga4_sessions||[]).reduce((s,r)=>s+r.sessions,0);
  const topCh = (d.ga4_sessions||[])[0];
  return `<div class="stats">
    <div class="stat-card"><div class="stat-label">Total Sessions</div>
      <div class="stat-value">${fmtNum(sessions)}</div>
      <div class="stat-sub">GA4 · ${d.month_label} · excl. app logins</div></div>
    <div class="stat-card"><div class="stat-label">Top Channel</div>
      <div class="stat-value" style="font-size:1.1rem">${topCh?.channel||'N/A'}</div>
      <div class="stat-sub">${fmtNum(topCh?.sessions||0)} sessions</div></div>
    <div class="stat-card"><div class="stat-label">Deals This Month</div>
      <div class="stat-value">${fmtNum(d.total_deals)}</div>
      <div class="stat-sub">HubSpot CRM · ${d.month_label}</div></div>
    <div class="stat-card"><div class="stat-label">Pipeline This Month</div>
      <div class="stat-value">${fmtMoney(d.total_revenue)}</div>
      <div class="stat-sub">${d.month_label}</div></div>
  </div>`;
}

function buildAI(d) {
  if (!d.ai_summary) return '';
  const html = typeof marked !== 'undefined'
    ? marked.parse(d.ai_summary)
    : `<pre style="white-space:pre-wrap;font-size:0.85rem">${d.ai_summary}</pre>`;
  return `${sHdr('🤖',`AI Analysis · ${d.month_label}`)}
  <div class="card" style="margin-bottom:1rem;border-left:3px solid #635bff">
    <div class="ai-summary">${html}</div></div>`;
}

function buildGA4(d) {
  return `${sHdr('📈',`GA4 Traffic · ${d.month_label}`)}
  <div class="grid-2">
    ${crd('Session Trend','<div class="chart-wrap"><canvas id="trendChart"></canvas></div>')}
    ${crd('Sessions by Channel','<div class="chart-wrap"><canvas id="channelChart"></canvas></div>')}
  </div>`;
}

function buildAudience(d) {
  const maxS = (d.ga4_geo||[])[0]?.sessions||1;
  const geoRows = (d.ga4_geo||[]).map(g => {
    const pct = (g.sessions/maxS*100).toFixed(0);
    return `<tr><td>${g.region}</td><td>${fmtNum(g.sessions)}</td>
      <td><div style="background:#232330;border-radius:4px;height:8px">
        <div style="background:#635bff;height:8px;border-radius:4px;width:${pct}%"></div></div></td></tr>`;
  }).join('');
  return `${sHdr('👥','Audience Breakdown')}
  <div class="grid-3">
    ${crd('Device Breakdown','<div class="chart-wrap-sm"><canvas id="deviceChart"></canvas></div>')}
    ${crd('New vs Returning','<div class="chart-wrap-sm"><canvas id="nrChart"></canvas></div>')}
    ${crd('Top Regions',`<table><thead><tr><th>Region</th><th>Sessions</th><th style="width:40%">Share</th></tr></thead>
      <tbody>${geoRows}</tbody></table>`)}
  </div>`;
}

function buildEngagement(d) {
  const rows = (d.ga4_engagement||[]).map(e =>
    `<tr><td>${e.channel}</td><td>${fmtNum(e.sessions)}</td>
     <td>${(e.bounce_rate||0).toFixed(1)}%</td><td>${fmtDur(e.avg_duration)}</td></tr>`
  ).join('');
  return `${sHdr('⚡','Engagement by Channel')}
  <div class="card" style="margin-bottom:1rem"><div class="card-title">Bounce Rate & Session Duration by Channel</div>
    <table><thead><tr><th>Channel</th><th>Sessions</th><th>Bounce Rate</th><th>Avg Duration</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function buildPages(d) {
  const rows = (d.ga4_pages||[]).map(p => {
    const cr = p.sessions>0 ? (p.conversions/p.sessions*100).toFixed(1)+'%' : '—';
    return `<tr><td style="font-size:0.78rem;word-break:break-all">${p.page}</td>
      <td>${fmtNum(p.sessions)}</td><td>${p.conversions}</td><td>${cr}</td></tr>`;
  }).join('');
  return `${sHdr('🏠',`Top Landing Pages · ${d.month_label}`)}
  <div class="card" style="margin-bottom:1rem"><div class="card-title">Pages by traffic · ${d.month_label}</div>
    <table><thead><tr><th>Page</th><th>Sessions</th><th>Conversions</th><th>Conv Rate</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function buildHubSpot(d) {
  return `${sHdr('💼',`HubSpot Attribution · ${d.month_label}`)}
  <div class="grid-2">
    ${crd('Deals by Attribution Source','<div class="chart-wrap"><canvas id="dealChart"></canvas></div>')}
    ${crd('Deal Stage Funnel','<div class="chart-wrap"><canvas id="stageChart"></canvas></div>')}
  </div>`;
}

function buildSources(d) {
  const rows = (d.source_summary||[]).map(s => {
    const ttc = s.avg_ttc!=null ? s.avg_ttc.toFixed(0)+'d' : '—';
    return `<tr><td><span class="badge">${s.source}</span></td>
      <td>${s.count}</td><td>${s.amount?fmtMoney(s.amount):'—'}</td>
      <td>${(s.win_rate||0).toFixed(0)}%</td><td>${ttc}</td></tr>`;
  }).join('');
  return `${sHdr('🔍','Source Deep Dive · Win Rate & Time to Close')}
  <div class="card" style="margin-bottom:1rem"><div class="card-title">Performance by attribution source</div>
    <table><thead><tr><th>Source</th><th>Deals</th><th>Pipeline Value</th><th>Win Rate</th><th>Avg Days to Close</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function buildSC(d) {
  const qs=d.sc_queries||[], pg=d.sc_pages||[];
  const totalC=qs.reduce((s,q)=>s+q.clicks,0), totalI=qs.reduce((s,q)=>s+q.impressions,0);
  const branded=qs.filter(q=>isBranded(q.query)), unbranded=qs.filter(q=>!isBranded(q.query));
  const bC=branded.reduce((s,q)=>s+q.clicks,0), uC=unbranded.reduce((s,q)=>s+q.clicks,0);
  const uI=unbranded.reduce((s,q)=>s+q.impressions,0);
  const bPct=totalC>0?(bC/totalC*100).toFixed(0):0, uPct=totalC>0?(uC/totalC*100).toFixed(0):0;
  const bPos=bC>0?(branded.reduce((s,q)=>s+q.position*q.clicks,0)/bC).toFixed(1):'—';
  const uPos=uC>0?(unbranded.reduce((s,q)=>s+q.position*q.clicks,0)/uC).toFixed(1):'—';

  const qRows=qs.slice(0,20).map(q=>{
    const b=isBranded(q.query);
    const bc=b?'rgba(99,91,255,0.1);border:1px solid rgba(99,91,255,0.15);color:#635bff'
              :'rgba(0,196,140,0.1);border:1px solid rgba(0,196,140,0.15);color:#00c48c';
    return `<tr><td style="font-size:0.8rem">${q.query}
      <span style="font-size:0.6rem;padding:0.1rem 0.4rem;border-radius:4px;background:${bc}">${b?'Brand':'Unbranded'}</span></td>
      <td>${fmtNum(q.clicks)}</td><td>${fmtNum(q.impressions)}</td>
      <td>${(q.ctr||0).toFixed(1)}%</td><td>${(q.position||0).toFixed(1)}</td></tr>`;
  }).join('');

  const topU=[...unbranded].sort((a,b)=>b.clicks-a.clicks).slice(0,10);
  const uRows=topU.length?topU.map(q=>
    `<tr><td style="font-size:0.8rem">${q.query}</td>
    <td>${fmtNum(q.clicks)}</td><td>${fmtNum(q.impressions)}</td>
    <td>${(q.ctr||0).toFixed(1)}%</td><td>${(q.position||0).toFixed(1)}</td></tr>`
  ).join(''):'<tr><td colspan="5" style="color:var(--muted);font-size:0.8rem">No unbranded queries — all traffic is branded.</td></tr>';

  const pRows=pg.slice(0,10).map(p=>
    `<tr><td style="font-size:0.78rem;word-break:break-all">${p.page||'/'}</td>
    <td>${fmtNum(p.clicks)}</td><td>${fmtNum(p.impressions)}</td>
    <td>${(p.ctr||0).toFixed(1)}%</td><td>${(p.position||0).toFixed(1)}</td></tr>`
  ).join('');

  return `${sHdr('🔎',`Google Search Console · ${d.month_label}`)}
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1rem">
    <div class="stat-card" style="border-top:2px solid #635bff">
      <div class="stat-label">Total Clicks</div><div class="stat-value">${fmtNum(totalC)}</div>
      <div class="stat-sub">from ${fmtNum(totalI)} impressions</div></div>
    <div class="stat-card" style="border-top:2px solid #635bff">
      <div class="stat-label">Branded Clicks</div><div class="stat-value">${fmtNum(bC)}</div>
      <div class="stat-sub">${bPct}% of total · avg pos ${bPos}</div></div>
    <div class="stat-card" style="border-top:2px solid #00c48c">
      <div class="stat-label">Unbranded Clicks</div><div class="stat-value">${fmtNum(uC)}</div>
      <div class="stat-sub">${uPct}% of total · avg pos ${uPos}</div></div>
    <div class="stat-card" style="border-top:2px solid #f5a623">
      <div class="stat-label">Unbranded Impressions</div><div class="stat-value">${fmtNum(uI)}</div>
      <div class="stat-sub">people searching without knowing Privy</div></div>
  </div>
  <div class="grid-2">
    ${crd('All Queries · Branded vs Unbranded',`<table>
      <thead><tr><th>Query</th><th>Clicks</th><th>Impressions</th><th>CTR</th><th>Position</th></tr></thead>
      <tbody>${qRows}</tbody></table>`)}
    ${crd('Unbranded Only · Acquisition Keywords',`<table>
      <thead><tr><th>Query</th><th>Clicks</th><th>Impressions</th><th>CTR</th><th>Position</th></tr></thead>
      <tbody>${uRows}</tbody></table>`)}
  </div>
  <div class="card" style="margin-bottom:1rem"><div class="card-title">Top Pages by Search Clicks</div>
    <table><thead><tr><th>Page</th><th>Clicks</th><th>Impressions</th><th>CTR</th><th>Position</th></tr></thead>
    <tbody>${pRows}</tbody></table></div>`;
}

function buildDeals(d) {
  const deals=[...(d.deals||[])].sort((a,b)=>b.amount-a.amount).slice(0,50);
  const rows=deals.map(deal=>
    `<tr><td>${deal.name}</td>
    <td><span class="badge">${(deal.source||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</span></td>
    <td>${deal.amount?fmtMoney(deal.amount):'—'}</td>
    <td>${deal.created||'—'}</td><td>${deal.closed||'Open'}</td></tr>`
  ).join('');
  return `${sHdr('📋',`Deal Detail · ${d.month_label} · Top 50 by Value`)}
  <div class="card" style="margin-bottom:1rem">
    <table><thead><tr><th>Deal Name</th><th>Source</th><th>Amount</th><th>Created</th><th>Close Date</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function buildFooter(d) {
  const gen = d.generated_at ? new Date(d.generated_at).toLocaleString() : 'N/A';
  return `<div class="footer">Privy Attribution · GA4 Property 299211655 + HubSpot CRM · App login traffic excluded · ${d.month_label} (${d.report_start||''} to ${d.report_end||''}) · Generated ${gen}</div>`;
}

function createCharts(d) {
  Chart.defaults.color = '#666';
  Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
  Chart.defaults.font.size = 11;
  const trend=d.ga4_trend||[], chans=d.ga4_sessions||[], devices=d.ga4_devices||[];
  const nr=d.ga4_new_returning||[], sources=d.source_summary||[], stages=d.stage_summary||[];

  mkChart('trendChart',{type:'line',data:{labels:trend.map(r=>r.date),datasets:[{
    data:trend.map(r=>r.sessions),borderColor:'#635bff',backgroundColor:'rgba(99,91,255,0.08)',
    borderWidth:2,pointRadius:2,fill:true,tension:0.4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{color:GRID},ticks:{maxTicksLimit:8}},y:{grid:{color:GRID},beginAtZero:true}}}});

  mkChart('channelChart',{type:'bar',data:{labels:chans.map(r=>r.channel),datasets:[{
    data:chans.map(r=>r.sessions),backgroundColor:COLORS,borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{maxRotation:30}},y:{grid:{color:GRID},beginAtZero:true}}}});

  mkChart('deviceChart',{type:'doughnut',data:{labels:devices.map(d=>d.device),datasets:[{
    data:devices.map(d=>d.sessions),backgroundColor:COLORS,borderColor:'#15151e',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,color:'#e6e6f0'}}}}});

  mkChart('nrChart',{type:'doughnut',data:{labels:nr.map(r=>r.type),datasets:[{
    data:nr.map(r=>r.sessions),backgroundColor:['#635bff','#00c48c'],borderColor:'#15151e',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,color:'#e6e6f0'}}}}});

  mkChart('dealChart',{type:'doughnut',data:{labels:sources.slice(0,8).map(s=>s.source),datasets:[{
    data:sources.slice(0,8).map(s=>s.count),backgroundColor:COLORS,borderColor:'#15151e',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'right',labels:{boxWidth:10,padding:10,color:'#e6e6f0'}}}}});

  mkChart('stageChart',{type:'bar',data:{labels:stages.slice(0,8).map(s=>(s.stage||'').substring(0,30)),datasets:[{
    data:stages.slice(0,8).map(s=>s.count),backgroundColor:'#635bff99',borderColor:'#635bff',
    borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
      scales:{x:{grid:{color:GRID},beginAtZero:true},y:{grid:{display:false}}}}});
}

function renderMonth(d) {
  destroyCharts();
  const sub = document.getElementById('headerSub');
  if (sub) sub.textContent = 'GA4 + HUBSPOT · ' + (d.month_label||'').toUpperCase() + ' (EXCLUDING APP.PRIVY.PRO)';
  document.getElementById('dashContent').innerHTML = [
    buildStats(d), buildAI(d), buildGA4(d), buildAudience(d),
    buildEngagement(d), buildPages(d), buildHubSpot(d),
    buildSources(d), buildSC(d), buildDeals(d), buildFooter(d)
  ].join('');
  requestAnimationFrame(() => createCharts(d));
}

function renderTabs(data) {
  document.getElementById('tabBar').innerHTML = data.map((h,i) =>
    `<button class="tab-btn ${i===0?'active':''}" onclick="selectTab(${i},this)">${h.month_label}</button>`
  ).join('');
}

function selectTab(idx, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMonth(historyData[idx]);
}

async function init() {
  try {
    const resp = await fetch(HISTORY_URL + '?nc=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    historyData = (await resp.json()).sort((a,b) => b.month.localeCompare(a.month));
    if (!historyData.length) throw new Error('No data in history.json');
    renderTabs(historyData);
    renderMonth(historyData[0]);
  } catch(e) {
    document.getElementById('dashContent').innerHTML =
      '<div style="padding:2rem;color:#ff5c5c">Error loading dashboard: ' + e.message + '</div>';
  }
}

init();
</script>
</body>
